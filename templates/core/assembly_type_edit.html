{% extends 'base.html' %}

{% block title %}Edit Assembly Type{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="d-flex align-items-center mb-4">
            <a href="{% url 'config' %}" class="btn btn-outline-secondary me-3">
                <i class="bi bi-arrow-left"></i> Back to Config
            </a>
            <h1 class="mb-0">Edit Assembly Type</h1>
        </div>

        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="bi bi-tools"></i> Edit Assembly Type</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="name" class="form-label">Assembly Type Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" 
                               value="{{ assembly_type.name }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="value" class="form-label">Value/Code <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="value" name="value" 
                               value="{{ assembly_type.value }}" required>
                        <div class="form-text">Unique identifier/code for this assembly type</div>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="3">{{ assembly_type.description }}</textarea>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a href="{% url 'config' %}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
